name: Authorize kit-ui git dependency
description: >-
  Lets npm fetch the frontend's private "@kenn-io/kit-ui" git dependency
  (github:kenn-io/kit-ui#<commit> in frontend/package.json, recorded as
  git+ssh://git@github.com/kenn-io/kit-ui.git in the lockfile). Rewrites that
  repository's ssh URL to token-authenticated HTTPS in the runner's global
  git config, scoped to kenn-io/kit-ui only. kit-ui is a private repository,
  so pass a token with contents:read on kenn-io/kit-ui.
inputs:
  token:
    description: >-
      Token with contents:read on kenn-io/kit-ui (fine-grained PAT or
      GitHub App installation token), e.g. secrets.KIT_UI_TOKEN.
    required: true
runs:
  using: composite
  steps:
    - name: Rewrite kit-ui ssh URL to authenticated HTTPS
      shell: bash
      env:
        KIT_UI_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        if [ -z "$KIT_UI_TOKEN" ]; then
          echo "::error::KIT_UI_TOKEN is empty. npm cannot fetch the private @kenn-io/kit-ui git dependency without it: provision a KIT_UI_TOKEN repository secret holding a token with contents:read on kenn-io/kit-ui."
          exit 1
        fi
        authed="https://x-access-token:${KIT_UI_TOKEN}@github.com/kenn-io/kit-ui"
        git config --global "url.${authed}.insteadOf" "ssh://git@github.com/kenn-io/kit-ui"
        git config --global --add "url.${authed}.insteadOf" "git@github.com:kenn-io/kit-ui"
