minimum_prek_version = "0.3.6"
default_install_hook_types = ["pre-commit", "pre-push"]
default_stages = ["pre-commit"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "golangci-lint"
name = "golangci-lint"
language = "system"
entry = "make lint-golangci"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "nilaway"
name = "NilAway"
language = "system"
entry = "make nilaway"
stages = ["pre-push"]
types = ["go"]
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "mdformat"
name = "mdformat"
language = "system"
entry = "uvx --from mdformat==0.7.22 --with mdformat-frontmatter --with mdformat-mkdocs --with mdformat-tables==1.0.0 mdformat --wrap 80 --align-semantic-breaks-in-lists"
types = ["markdown"]
exclude = "^docs/(activity|changelog|chat-import|commands|configuration|duckdb|index|insights|pg-sync|quickstart|remote-access|session-api|session-intelligence|stats|token-usage|usage)\\.md$"
